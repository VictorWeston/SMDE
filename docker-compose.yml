services:
  postgres:
    image: postgres:16-alpine
    container_name: smde-postgres
    environment:
      POSTGRES_USER: smde
      POSTGRES_PASSWORD: smde
      POSTGRES_DB: smde
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smde"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
